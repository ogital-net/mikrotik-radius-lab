<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Latigo{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #f59e0b;
            letter-spacing: 0.05em;
        }
        .logo p {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 0.375rem;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.75rem 1rem;
            background: #f59e0b;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .btn:hover { background: #d97706; }
        .btn-secondary {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
            margin-top: 0.75rem;
        }
        .btn-secondary:hover { border-color: #f59e0b; color: #f59e0b; }
        .error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .success {
            background: #14532d;
            border: 1px solid #166534;
            color: #86efac;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .info {
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 1rem;
        }
        .info a { color: #f59e0b; text-decoration: none; }
        .info a:hover { text-decoration: underline; }
        .session-info {
            margin: 1rem 0;
        }
        .session-info dt {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .session-info dd {
            font-size: 1.125rem;
            color: #e2e8f0;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>LATIGO</h1>
            <p>{% block subtitle %}Wi-Fi Portal{% endblock %}</p>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
