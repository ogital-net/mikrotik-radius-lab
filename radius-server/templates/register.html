{% extends "base.html" %}

{% block title %}Latigo - Sign Up{% endblock %}
{% block subtitle %}Create an account{% endblock %}

{% block content %}
{% if let Some(error) = error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" action="/register">
    <input type="hidden" name="link_login" value="{{ link_login }}">
    <input type="hidden" name="link_orig" value="{{ link_orig }}">
    <input type="hidden" name="mac" value="{{ mac }}">
    <input type="hidden" name="ip" value="{{ ip }}">

    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
    </div>
    <div class="form-group">
        <label for="password_confirm">Confirm Password</label>
        <input type="password" id="password_confirm" name="password_confirm" required>
    </div>
    <button type="submit" class="btn">Create Account</button>
</form>

<div class="info">
    <p>Already have an account? <a href="/login?link_login={{ link_login|urlencode }}&link_orig={{ link_orig|urlencode }}&mac={{ mac|urlencode }}&ip={{ ip|urlencode }}">Sign in</a></p>
</div>
{% endblock %}
